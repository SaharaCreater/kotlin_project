<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#6750A4"/>
  <title>Физика в AR — DoPP</title>
  <link rel="stylesheet" href="/css/md3.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
  <!-- App Shell -->
  <div id="app" class="app-shell">
    <!-- Navigation Rail (desktop) / Bottom Nav (mobile) -->
    <nav id="nav-rail" class="nav-rail" style="display:none">
      <div class="nav-rail-logo">
        <span class="material-symbols-rounded nav-logo-icon">science</span>
        <span class="nav-logo-text">DoPP</span>
      </div>
      <div class="nav-rail-items" id="nav-rail-items"></div>
      <div class="nav-rail-footer">
        <button class="nav-item" id="nav-profile-rail" onclick="App.navigate('/profile')">
          <div class="nav-avatar" id="nav-avatar-rail">?</div>
          <span class="nav-label">Профиль</span>
        </button>
      </div>
    </nav>
    <nav id="nav-bottom" class="nav-bottom" style="display:none">
      <div id="nav-bottom-items" class="nav-bottom-items"></div>
    </nav>

    <!-- Main content area -->
    <main id="main-content" class="main-content">
      <div id="view-container" class="view-container"></div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Dialog overlay -->
  <div id="dialog-overlay" class="dialog-overlay" style="display:none">
    <div id="dialog" class="dialog"></div>
  </div>

  <!-- Scripts -->
  <script src="/physics.js"></script>
  <script src="/simulations.js"></script>
  <script src="/js/services/AuthService.js"></script>
  <script src="/js/services/ApiService.js"></script>
  <script src="/js/services/CacheService.js"></script>
  <script src="/js/models/Experiment.js"></script>
  <script src="/js/viewmodels/AuthViewModel.js"></script>
  <script src="/js/viewmodels/ExperimentsViewModel.js"></script>
  <script src="/js/viewmodels/SimulationViewModel.js"></script>
  <script src="/js/views/LoginView.js"></script>
  <script src="/js/views/HomeView.js"></script>
  <script src="/js/views/ExperimentsView.js"></script>
  <script src="/js/views/ExperimentDetailView.js"></script>
  <script src="/js/views/ScannerView.js"></script>
  <script src="/js/views/ProfileView.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
